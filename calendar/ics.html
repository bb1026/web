<script src="js/lunarCalendar.js"></script>
<script>
const urlParams = new URLSearchParams(location.search);
const targetYear = parseInt(urlParams.get('year')) || new Date().getFullYear();

let events = [];

for (let m = 0; m < 12; m++) {
  for (let d = 1; d <= 31; d++) {
    const date = new Date(targetYear, m, d);
    if (date.getMonth() !== m) continue;

    // 完全用你给的正确调用方式
    const lunar = LunarCalendar.solarToLunar(date);

    let title = '';
    if (lunar.isSolarTerm) {
      title = lunar.solarTerm;
    } else if (lunar.isLunarFestival) {
      title = lunar.lunarFestival;
    } else if (lunar.isSolarFestival) {
      title = lunar.solarFestival;
    }

    if (title) {
      events.push({
        date: lunar.date,
        title: title
      });
    }
  }
}

// 生成标准ICS
let ics = `BEGIN:VCALENDAR
PRODID:-//BB1026//CN Holiday//ZH
VERSION:2.0
CALSCALE:GREGORIAN
METHOD:PUBLISH
X-WR-CALNAME:中国节气节假日 ${targetYear}
X-WR-TIMEZONE:Asia/Shanghai
BEGIN:VTIMEZONE
TZID:Asia/Shanghai
END:VTIMEZONE
`;

events.forEach((ev, i) => {
  const dt = ev.date.replace(/-/g, '');
  ics += `BEGIN:VEVENT
DTSTART;VALUE=DATE:${dt}
DTEND;VALUE=DATE:${dt}
SUMMARY:${ev.title}
UID:${dt}-${i}@cn
TRANSP:TRANSPARENT
END:VEVENT
`;
});

ics += "END:VCALENDAR";

// 输出纯文本，日历可直接订阅
document.body.textContent = ics;
</script>
