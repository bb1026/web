<script src="js/lunarCalendar.js"></script>
<script>
// 1. 获取年份
const urlParams = new URLSearchParams(location.search);
const year = parseInt(urlParams.get('year')) || new Date().getFullYear();

let events = [];

// 2. 循环每一天
for (let m = 0; m < 12; m++) {
  for (let d = 1; d <= 31; d++) {
    const date = new Date(year, m, d);
    if (date.getMonth() !== m) continue;

    // 完全按你给的正确用法
    const lunar = LunarCalendar.solarToLunar(date);

    let title = '';
    if (lunar.isSolarTerm) title = lunar.solarTerm;
    else if (lunar.isLunarFestival) title = lunar.lunarFestival;
    else if (lunar.isSolarFestival) title = lunar.solarFestival;

    if (title) {
      events.push({ date: lunar.date, title });
    }
  }
}

// 3. 输出 ICS
let ics = `BEGIN:VCALENDAR
PRODID:-//My Calendar//CN
VERSION:2.0
X-WR-CALNAME:中国节气节日 ${year}
X-WR-TIMEZONE:Asia/Shanghai
`;

events.forEach((e, i) => {
  const dt = e.date.replace(/-/g, '');
  ics += `BEGIN:VEVENT
DTSTART;VALUE=DATE:${dt}
DTEND;VALUE=DATE:${dt}
SUMMARY:${e.title}
UID:${dt}-${i}
END:VEVENT
`;
});

ics += "END:VCALENDAR";

// 强制输出文本
document.write("<pre>");
document.write(ics);
document.write("</pre>");
</script>
