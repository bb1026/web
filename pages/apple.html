<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>苹果设备自动识别查询</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen py-10 px-4 relative">
<div class="max-w-xl mx-auto">

<div id="debug-info" class="mb-6 p-4 bg-slate-800 text-green-400 text-xs rounded overflow-x-auto whitespace-pre-wrap"></div>

<h1 class="text-3xl font-bold text-center text-gray-800 mb-2">苹果设备识别工具</h1>
<p class="text-center text-gray-500 mb-8">自动读取当前设备型号 · 展示尺寸/重量/屏幕/A型号编码</p>

<div id="device-card" class="bg-white rounded-xl shadow-md p-6 mb-6">
<div id="loading" class="text-center py-10 text-gray-400">
<svg class="animate-spin h-8 w-8 mx-auto mb-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
<circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
<path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
</svg>
<span>正在识别设备信息...</span>
</div>
<div id="result-box" class="hidden"></div>
</div>

<div class="bg-white rounded-xl shadow-md p-6 relative z-20">
<h3 class="font-semibold text-gray-700 mb-3">手动搜索设备（支持：设备名 / Axxxx型号）</h3>
<div class="flex gap-2">
<input id="search-input" type="text" placeholder="例：iPhone 16、A2984、iPad Air6" class="flex-1 border border-gray-300 rounded-lg px-4 py-2 outline-none focus:ring-2 focus:ring-blue-400">
<button id="clear-btn" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600 transition">清空</button>
</div>
<div id="search-dropdown" class="hidden absolute left-0 right-0 mt-1 bg-white border border-gray-200 rounded-lg shadow-lg max-h-64 overflow-y-auto">
<ul id="result-list" class="divide-y divide-gray-100"></ul>
</div>
</div>
</div>

<div id="mask" class="fixed inset-0 z-10 hidden"></div>

<script>
let deviceDatabase = [];
let timer;
const loading = document.getElementById("loading");
const resultBox = document.getElementById("result-box");
const dropdown = document.getElementById("search-dropdown");
const list = document.getElementById("result-list");
const mask = document.getElementById("mask");
const input = document.getElementById("search-input");
const debugInfo = document.getElementById("debug-info");

// 屏幕分辨率对照表 key:宽,高,dpr
const screenMap = {
    "428,926,3": "iPhone14,2", // iPhone 13
    "390,844,3": "iPhone14,7", // iPhone 14
    "430,932,3": "iPhone15,2", // iPhone15
    "402,874,3": "iPhone16,1", // iPhone16
};

function printDebug() {
    const ua = navigator.userAgent;
    const touch = navigator.maxTouchPoints;
    const platform = navigator.platform;
    const width = screen.width;
    const height = screen.height;
    const dpr = window.devicePixelRatio;
    const key = `${width},${height},${dpr}`;

    debugInfo.innerText = `
=== UA信息 ===
${ua}
=== 其他参数 ===
maxTouchPoints: ${touch}
platform: ${platform}
屏幕宽高: ${width} × ${height}
设备像素比: ${dpr}
匹配key: ${key}
    `.trim();
}

async function loadJsonDB() {
  try {
    const res = await fetch(`/json/apple-devices.json?_t=${Date.now()}`, {
      cache: "no-store",
      headers: {
        Accept: "application/json",
      }
    });
    if (!res.ok) throw new Error("文件加载失败 状态码:" + res.status);
    deviceDatabase = await res.json();
    detectCurrentDevice();
  } catch (e) {
    loading.innerHTML = `<p class="text-red-500">JSON加载失败：${e.message}</p>`;
    console.error(e);
  }
}

// 新版识别函数：优先分辨率匹配，降级旧UA匹配
function getDeviceIdentifier() {
    const ua = navigator.userAgent;
    const touch = navigator.maxTouchPoints;
    const width = screen.width;
    const height = screen.height;
    const dpr = window.devicePixelRatio;
    const screenKey = `${width},${height},${dpr}`;

    // 1.先用分辨率匹配
    if(screenMap[screenKey]){
        return screenMap[screenKey];
    }

    // 2.兼容老设备UA匹配
    const iPhoneReg = ua.match(/iPhone(\d+),(\d+)/);
    if(iPhoneReg) return iPhoneReg[0];

    const iPadReg = ua.match(/iPad(\d+),(\d+)/);
    if(iPadReg) return iPadReg[0];

    if(/Macintosh/.test(ua) && touch > 1) return "HIDE_IPAD";

    const iPodReg = ua.match(/iPod(\d+),(\d+)/);
    if(iPodReg) return iPodReg[0];

    return null;
}

const findDeviceById = id => deviceDatabase.find(v => v.identifier === id) || null;

function normalize(v) {
  return String(v || "").toLowerCase().replace(/\s+/g, "").trim();
}

function fuzzySearch(keyword) {
  const kw = normalize(keyword);
  if (!kw) return [];
  return deviceDatabase.filter(item => {
    return normalize(item.modelName).includes(kw) ||
      (item.keywords || []).some(k => normalize(k).includes(kw)) ||
      (item.aNumbers || []).some(a => normalize(a).includes(kw));
  }).slice(0, 20);
}

function renderInfo(d) {
  loading.classList.add("hidden");
  resultBox.classList.remove("hidden");
  resultBox.innerHTML = `<div class="space-y-3">
<div class="flex justify-between items-center border-b pb-2">
<span class="text-lg font-bold text-gray-900">${d.modelName ?? "-"}</span>
<span class="px-2 py-1 bg-gray-100 text-sm rounded text-gray-600">${d.deviceType ?? "-"}</span>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-sm">
<div>硬件代号：<span class="font-mono">${d.identifier ?? "-"}</span></div>
<div>发布年份：${d.releaseYear ?? "-"}</div>
<div>机身尺寸：${d.height ?? "-"} × ${d.width ?? "-"} × ${d.depth ?? "-"} mm</div>
<div>整机重量：${d.weight ?? "-"} g</div>
<div>屏幕尺寸：${d.screenSize ?? "-"} 英寸</div>
<div>屏幕分辨率：${d.resolution ?? "-"}</div>
<div class="md:col-span-2"><span>后盖A型号编码：</span><div class="overflow-x-auto whitespace-nowrap font-mono text-blue-600 mt-1 pb-1">${(d.aNumbers || []).join("  ")}</div></div>
</div></div>`;
}

function detectCurrentDevice() {
  const id = getDeviceIdentifier();
  if (id === "HIDE_IPAD") {
    loading.innerHTML = '<p class="text-gray-500">新版iPad已被系统隐藏硬件ID</p><p class="text-xs mt-1 text-gray-400">请在上方搜索框手动查找型号</p>';
    return;
  }
  if (!id) {
    loading.innerHTML = '<p class="text-gray-500">无法自动识别设备</p><p class="text-xs mt-1 text-gray-400">建议在搜索框输入A码手动查询</p>';
    return;
  }
  const info = findDeviceById(id);
  if (info) {
    renderInfo(info);
  } else {
    loading.innerHTML = `<p class="text-orange-500">识别到代号：${id}</p><p class="text-xs mt-1 text-gray-400">数据库内暂无该机型数据</p>`;
  }
}

function closeDropdown() {
  dropdown.classList.add("hidden");
  mask.classList.add("hidden");
}

function doSearch(v) {
  const rs = fuzzySearch(v);
  list.innerHTML = "";
  if (!rs.length) {
    closeDropdown();
    return;
  }
  rs.forEach(d => {
    const li = document.createElement("li");
    li.className = "px-4 py-3 hover:bg-gray-50 cursor-pointer transition";
    li.innerHTML = `<div class="font-medium text-gray-800">${d.modelName}</div><div class="text-xs text-gray-500 mt-1">A码：${(d.aNumbers || []).join(" ")}</div>`;
    li.onclick = () => {
      renderInfo(d);
      input.value = "";
      closeDropdown();
    };
    list.appendChild(li);
  });
  dropdown.classList.remove("hidden");
  mask.classList.remove("hidden");
}

input.addEventListener("input", e => {
  clearTimeout(timer);
  timer = setTimeout(() => doSearch(e.target.value), 150);
});
input.addEventListener("keydown", e => {
  if (e.key === "Escape") closeDropdown();
  if (e.key === "Enter") {
    const firstItem = list.querySelector("li");
    if (firstItem) firstItem.click();
  }
});
mask.onclick = closeDropdown;
document.getElementById("clear-btn").onclick = () => {
  input.value = "";
  closeDropdown();
};

document.addEventListener("DOMContentLoaded", () => {
    printDebug();
    loadJsonDB();
});
</script>
</body>
</html>
