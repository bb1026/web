<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no" />
<meta name="google-adsense-account" content="ca-pub-7777281841149510">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7777281841149510"
     crossorigin="anonymous"></script>

<title>二维码生成器</title>

<script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>

<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/floating-menu.css">

<style>
  body {
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    max-width: 750px;
    margin: 20px auto;
    padding: 20px;
    background: #f9fafc;
    color: #222;
  }

  .file-upload {
    display: inline-block;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    background-color: #4CAF50;
    color: white;
    padding: 8px 16px;
    font-size: 14px;
    border-radius: 6px;
    transition: background-color 0.3s;
  }

  .file-upload:hover {
    background-color: #45a049;
  }

  .file-upload input[type="file"] {
    position: absolute;
    left: 0;
    top: 0;
    opacity: 0;
    cursor: pointer;
    height: 100%;
    width: 100%;
  }

  #logoStatus {
    font-size: 13px;
    color: #666;
    margin-top: 4px;
  }

  h2 {
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .home-btn {
    display: block;
    width: fit-content;
    margin: 0 auto 15px auto;
    padding: 8px 14px;
    background: #333;
    color: #fff;
    border-radius: 6px;
    text-decoration: none;
    font-size: 14px;
  }

  .home-btn:hover {
    background: #000;
  }

  fieldset {
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 1rem 1.2rem;
    margin-bottom: 1.2rem;
    background: #fff;
  }

  legend {
    font-weight: 600;
    padding: 0 6px;
  }

  label {
    margin-right: 15px;
    cursor: pointer;
    user-select: none;
  }

  input[type="text"], input[type="email"], input[type="tel"], input[type="url"], input[type="date"], textarea {
    width: 100%;
    padding: 7px 10px;
    margin: 6px 0 12px;
    box-sizing: border-box;
    border-radius: 6px;
    border: 1px solid #bbb;
    font-size: 14px;
  }

  textarea { resize: vertical; }

  .button {
    display: inline-block;
    background: #2874f0;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 12px 28px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
  }

  .button:hover { background: #1a52d8; }

  #qr-section {
    display: none;
    margin-top: 30px;
    text-align: center;
  }

  .hidden { display: none !important; }
</style>
</head>

<body>

<h2>二维码生成器</h2>

<!-- ✅ 首页按钮 -->
<a class="home-btn" href="/">🏠 首页</a>

<!-- 内容类型 -->
<fieldset>
  <legend>内容类型</legend>
  <label><input type="radio" name="type" value="text" checked> 文本</label>
  <label><input type="radio" name="type" value="url"> 网址</label>
  <label><input type="radio" name="type" value="tel"> 电话</label>
  <label><input type="radio" name="type" value="wifi"> WiFi</label>
  <label><input type="radio" name="type" value="vcard"> vCard</label>
</fieldset>

<!-- 输入区域 -->
<div id="inputs">
  <label>输入内容：<input type="text" id="content" placeholder="请输入内容"></label>
</div>

<!-- WiFi -->
<div id="wifi-password-wrapper" class="hidden">
  <label>WiFi 密码：<input type="text" id="wifi-password"></label>
</div>

<div id="wifi-encryption-wrapper" class="hidden">
  <fieldset>
    <legend>加密方式</legend>
    <label><input type="radio" name="wifi-encryption" value="WPA" checked> WPA/WPA2</label>
    <label><input type="radio" name="wifi-encryption" value="WEP"> WEP</label>
    <label><input type="radio" name="wifi-encryption" value="nopass"> 无加密</label>
  </fieldset>
</div>

<!-- vCard -->
<div id="vcard-inputs" class="hidden">
  <label>姓名: <input type="text" id="vcard-fn"></label>
</div>

<!-- 颜色 -->
<fieldset>
  <legend>颜色</legend>
  <label><input type="radio" name="colorMode" value="black" checked> 黑色</label>
  <label><input type="radio" name="colorMode" value="gradient"> 渐变</label>
</fieldset>

<!-- 尺寸 -->
<fieldset>
  <legend>尺寸</legend>
  <label><input type="radio" name="size" value="256" checked> 256</label>
  <label><input type="radio" name="size" value="512"> 512</label>
  <label><input type="radio" name="size" value="768"> 768</label>
</fieldset>

<!-- 图片格式 -->
<fieldset>
  <legend>图片格式</legend>
  <label><input type="radio" name="format" value="png" checked> PNG</label>
  <label><input type="radio" name="format" value="jpeg"> JPEG</label>
  <label><input type="radio" name="format" value="webp"> WEBP</label>
</fieldset>

<!-- 生成按钮 -->
<div style="text-align:center;">
  <button id="generate-btn" class="button">生成二维码</button>
</div>

<!-- QR -->
<div id="qr-section">
  <div id="qr-container"></div>
</div>

<script>
(() => {
  const qrContainer = document.getElementById('qr-container');
  const generateBtn = document.getElementById('generate-btn');
  const contentInput = document.getElementById('content');

  let qrCode = null;

  function getText() {
    return contentInput.value.trim();
  }

  function render() {
    const text = getText();
    if(!text) return alert("请输入内容");

    qrContainer.innerHTML = "";

    qrCode = new QRCodeStyling({
      width: 256,
      height: 256,
      data: text
    });

    qrCode.append(qrContainer);
  }

  generateBtn.addEventListener("click", render);
})();
</script>

</body>
</html>
