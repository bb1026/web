<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no" />

<title>二维码生成器</title>

<script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>

<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/floating-menu.css">

<style>
body {
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  max-width: 750px;
  margin: 20px auto;
  padding: 20px;
  background: #f9fafc;
  color: #222;
}

.file-upload {
  display: inline-block;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  background-color: #4CAF50;
  color: white;
  padding: 8px 16px;
  font-size: 14px;
  border-radius: 6px;
}

.file-upload input {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}

.hidden { display:none !important; }

.button {
  background:#2874f0;
  color:#fff;
  border:none;
  padding:12px 20px;
  border-radius:6px;
  cursor:pointer;
}

#qr-section { display:none; text-align:center; margin-top:20px; }
</style>
</head>

<body>

<h2>二维码生成器</h2>

<div id="fm-container"></div>

<fieldset>
<legend>内容类型</legend>
<label><input type="radio" name="type" value="text" checked> 文本</label>
<label><input type="radio" name="type" value="url"> 网址</label>
<label><input type="radio" name="type" value="tel"> 电话</label>
<label><input type="radio" name="type" value="wifi"> WiFi</label>
<label><input type="radio" name="type" value="vcard"> vCard</label>
</fieldset>

<div>
<input type="text" id="content" placeholder="输入内容" style="width:100%;padding:8px;">
</div>

<div id="wifi-password-wrapper" class="hidden">
<input type="text" id="wifi-password" placeholder="WiFi密码" style="width:100%;padding:8px;">
</div>

<fieldset>
<legend>WiFi加密</legend>
<label><input type="radio" name="wifi-encryption" value="WPA" checked> WPA</label>
<label><input type="radio" name="wifi-encryption" value="WEP"> WEP</label>
<label><input type="radio" name="wifi-encryption" value="nopass"> 无加密</label>
</fieldset>

<div>
<label class="file-upload">
选择Logo
<input type="file" id="logoFile" accept="image/*">
</label>
</div>

<div style="text-align:center;margin-top:10px;">
<button id="generate-btn" class="button">生成二维码</button>
</div>

<div id="qr-section">
<div id="qr-container"></div>
<div id="text-output"></div>
<button id="save-btn" class="button">保存</button>
</div>

<script>
(() => {

const qrContainer = document.getElementById("qr-container");
const textOutput = document.getElementById("text-output");
const generateBtn = document.getElementById("generate-btn");
const saveBtn = document.getElementById("save-btn");
const logoFile = document.getElementById("logoFile");

const contentInput = document.getElementById("content");
const wifiPassword = document.getElementById("wifi-password");
const wifiWrap = document.getElementById("wifi-password-wrapper");

const wifiRadios = document.getElementsByName("wifi-encryption");

let logoImage = null;
let qr = null;

function getType(){
  return document.querySelector('input[name="type"]:checked').value;
}

function getWifiEnc(){
  return [...wifiRadios].find(r=>r.checked).value;
}

function buildText(){
  const type = getType();
  const val = contentInput.value;

  if(type==="text") return val;

  if(type==="url") return val.startsWith("http") ? val : "http://"+val;

  if(type==="tel") return "TEL:"+val;

  if(type==="wifi"){
    const enc = getWifiEnc();
    if(enc==="nopass") return `WIFI:T:nopass;S:${val};;`;
    return `WIFI:T:${enc};S:${val};P:${wifiPassword.value};;`;
  }

  return val;
}

function render(){

const data = buildText();
if(!data) return;

document.getElementById("qr-section").style.display="block";

qrContainer.innerHTML="";

qr = new QRCodeStyling({
  width: 300,
  height: 300,
  data,
  image: logoImage,
  dotsOptions: { color:"#000" },
  imageOptions: { imageSize:0.2 }
});

qr.append(qrContainer);

textOutput.textContent = data;

}

generateBtn.onclick = render;

saveBtn.onclick = () => {
  if(!qr) return;
  qr.getRawData("png").then(blob=>{
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="qr.png";
    a.click();
  });
};

logoFile.addEventListener("change", e=>{
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>logoImage=e.target.result;
  reader.readAsDataURL(file);
});

document.querySelectorAll('input[name="type"]').forEach(r=>{
  r.onchange=()=>{
    wifiWrap.classList.toggle("hidden", getType()!=="wifi");
  }
});

})();
</script>

</body>
</html>
