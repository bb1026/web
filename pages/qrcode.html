<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no" />

<title>二维码生成器</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f5f7fb;
  margin:0;
  padding:16px;
  max-width:760px;
  margin:auto;
}

h2{
  text-align:center;
  margin:10px 0 18px;
  font-size:20px;
}

/* 卡片 */
.card{
  background:#fff;
  border-radius:14px;
  padding:14px;
  margin-bottom:14px;
  box-shadow:0 4px 14px rgba(0,0,0,.06);
}

/* 类型选择 */
.row{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}

.option{
  background:#f1f3f5;
  padding:10px;
  border-radius:10px;
  text-align:center;
  font-size:14px;
  cursor:pointer;
  user-select:none;
}

.option.active{
  background:#2563eb;
  color:#fff;
}

/* 输入 */
input,textarea{
  width:100%;
  box-sizing:border-box;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:#fff;
  font-size:15px;
}

/* QR */
#qr{
  text-align:center;
  margin-top:16px;
}

img{
  max-width:100%;
  border-radius:12px;
  box-shadow:0 6px 16px rgba(0,0,0,.1);
}

/* WiFi segmented */
.enc-box{
  display:flex;
  gap:6px;
  margin-top:10px;
  background:#f1f3f5;
  padding:6px;
  border-radius:10px;
}

.enc-option{
  flex:1;
  text-align:center;
  padding:8px;
  border-radius:8px;
  font-size:13px;
  cursor:pointer;
  user-select:none;
}

.enc-option input{ display:none; }

.enc-option.active{
  background:#2563eb;
  color:#fff;
}
</style>
</head>

<body>

<h2>二维码生成器 Pro</h2>

<div class="card">
  <div class="row" id="typeBox">
    <div class="option active" data-type="text">文本</div>
    <div class="option" data-type="url">网址</div>
    <div class="option" data-type="tel">电话</div>
    <div class="option" data-type="sms">短信</div>
    <div class="option" data-type="email">邮件</div>
    <div class="option" data-type="wifi">WiFi</div>
    <div class="option" data-type="vcard">联系人</div>
    <div class="option" data-type="whatsapp">WhatsApp</div>
    <div class="option" data-type="geo">地图</div>
  </div>
</div>

<div class="card" id="inputs"></div>

<div class="card">
  <button onclick="gen()">生成二维码</button>
</div>

<div id="qr"></div>

<script>
let type="text";

const inputs=document.getElementById("inputs");
const typeBox=document.getElementById("typeBox");

function render(){
let html="";

if(type==="text") html=`<input id="text" placeholder="输入文本">`;
if(type==="url") html=`<input id="url" placeholder="https://example.com">`;
if(type==="tel") html=`<input id="tel" placeholder="电话号码">`;

if(type==="sms"){
html=`
<input id="sms_tel" placeholder="手机号">
<input id="sms_text" placeholder="短信内容">
`;
}

if(type==="email"){
html=`
<input id="email" placeholder="邮箱">
<input id="subject" placeholder="主题">
<input id="body" placeholder="内容">
`;
}

if(type==="wifi"){
html=`
<input id="ssid" placeholder="WiFi名称">
<input id="password" placeholder="密码">

<div class="enc-box">
<div class="enc-option active"><input type="radio" name="enc" value="WPA" checked>WPA</div>
<div class="enc-option"><input type="radio" name="enc" value="WEP">WEP</div>
<div class="enc-option"><input type="radio" name="enc" value="nopass">无密码</div>
</div>
`;
}

if(type==="vcard"){
html=`
<input id="name" placeholder="姓名">
<input id="phone" placeholder="电话">
<input id="email" placeholder="邮箱">
`;
}

if(type==="whatsapp"){
html=`
<input id="wa" placeholder="手机号">
<input id="wa_text" placeholder="消息">
`;
}

if(type==="geo"){
html=`
<input id="lat" placeholder="纬度">
<input id="lng" placeholder="经度">
`;
}

inputs.innerHTML=html;
}

typeBox.addEventListener("click",e=>{
const el=e.target.closest(".option");
if(!el) return;

document.querySelectorAll(".option").forEach(o=>o.classList.remove("active"));
el.classList.add("active");
type=el.dataset.type;
render();
});

render();

document.addEventListener("click",e=>{
if(e.target.closest(".enc-option")){
document.querySelectorAll(".enc-option").forEach(o=>o.classList.remove("active"));
const el=e.target.closest(".enc-option");
el.classList.add("active");
el.querySelector("input").checked=true;
}
});

function gen(){
let data="";

if(type==="text") data=document.getElementById("text").value;
if(type==="url") data=document.getElementById("url").value;
if(type==="tel") data="tel:"+document.getElementById("tel").value;

if(type==="sms"){
data=`SMSTO:${sms_tel.value}:${sms_text.value}`;
}

if(type==="email"){
data=`mailto:${email.value}?subject=${encodeURIComponent(subject.value)}&body=${encodeURIComponent(body.value)}`;
}

if(type==="wifi"){
const enc=document.querySelector('input[name="enc"]:checked').value;
data=`WIFI:T:${enc};S:${ssid.value};P:${password.value};;`;
}

if(type==="vcard"){
data=`BEGIN:VCARD
VERSION:3.0
FN:${name.value}
TEL:${phone.value}
EMAIL:${email.value}
END:VCARD`;
}

if(type==="whatsapp"){
data=`https://wa.me/${wa.value}?text=${encodeURIComponent(wa_text.value)}`;
}

if(type==="geo"){
data=`geo:${lat.value},${lng.value}`;
}

if(!data) return alert("请输入内容");

document.getElementById("qr").innerHTML=
`<img src="https://qr.0515364.xyz/?data=${encodeURIComponent(data)}" width="260">`;
}
</script>

</body>
</html>
