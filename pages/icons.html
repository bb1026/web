<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Font Awesome 图标选择器</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">

  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 20px;
      max-width: 960px;
      margin: auto;
    }

    h2 {
      text-align: center;
    }

    .search-wrapper {
      position: relative;
      margin: 20px 0;
    }

    #iconSearch {
      padding: 10px 40px 10px 10px;
      width: 100%;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }

    .clear-btn {
      position: absolute;
      right: 10px;
      top: 45%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 16px;
      color: #999;
      cursor: pointer;
      display: none;
    }

    .icon-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
      gap: 12px;
    }

    .icon-box {
      text-align: center;
      padding: 12px 6px;
      border: 1px solid #eee;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s;
    }

    .icon-box:hover {
      background: #f0f8ff;
      transform: scale(1.08);
    }

    .icon-box i {
      font-size: 24px;
    }

    .icon-name {
      font-size: 12px;
      margin-top: 6px;
      word-break: break-word;
    }

    .status {
      margin-bottom: 10px;
      color: #888;
      font-size: 14px;
      text-align: center;
    }

    #topBtn {
      position: fixed;
      bottom: 30px;
      left: 30px;
      border: none;
      font-size: 30px;
      cursor: pointer;
      display: none;
      z-index: 999;
      background: none;
    }

    #randomColorBtn {
      position: fixed;
      top: 20px;
      left: 5px;
      border: none;
      font-size: 30px;
      cursor: pointer;
      z-index: 1000;
      background: none;
    }

    .copy-notification {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      transform: translateY(100px);
      opacity: 0;
      transition: 0.3s;
      z-index: 1000;
      max-width: 300px;
    }

    .copy-notification.show {
      transform: translateY(0);
      opacity: 1;
    }
  </style>
</head>

<body>

<h2>Font Awesome 图标选择器</h2>

<div class="status" id="status">正在加载图标...</div>

<div class="search-wrapper">
  <input type="text" id="iconSearch" placeholder="搜索图标">
  <button class="clear-btn" id="clearBtn">✕</button>
</div>

<div class="icon-grid" id="iconGrid"></div>

<button id="topBtn">⬆</button>
<button id="randomColorBtn">🎨</button>

<div id="copyNotification" class="copy-notification">
  <div id="copyText"></div>
</div>

<!-- ✅ 自动注入系统（核心） -->
<script src="/js/layout.js"></script>

<script>
let allIcons = [];

async function fetchIcons() {
  try {
    const res = await fetch('/json/icons.json');
    const data = await res.json();

    allIcons = Object.entries(data)
      .filter(([_, val]) => val.free && val.free.includes("solid"))
      .map(([name]) => name);

    document.getElementById("status").textContent =
      `共加载 ${allIcons.length} 个图标`;

    renderIcons(allIcons);
  } catch (e) {
    document.getElementById("status").textContent =
      "图标加载失败";
  }
}

function renderIcons(list) {
  const grid = document.getElementById("iconGrid");
  grid.innerHTML = "";

  list.forEach(name => {
    const div = document.createElement("div");
    div.className = "icon-box";

    div.innerHTML = `
      <i class="fas fa-${name}"></i>
      <div class="icon-name">${name}</div>
    `;

    div.onclick = () => {
      const full = `fa-${name}`;
      navigator.clipboard.writeText(full);

      document.getElementById("copyText").textContent = full;
      const n = document.getElementById("copyNotification");
      n.classList.add("show");

      setTimeout(() => n.classList.remove("show"), 2000);
    };

    grid.appendChild(div);
  });
}

document.getElementById("iconSearch").addEventListener("input", function () {
  let key = this.value.toLowerCase();
  if (key.startsWith("fa-")) key = key.slice(3);

  const filtered = allIcons.filter(i => i.includes(key));
  renderIcons(filtered);

  document.getElementById("clearBtn").style.display =
    this.value ? "block" : "none";
});

document.getElementById("clearBtn").onclick = () => {
  document.getElementById("iconSearch").value = "";
  renderIcons(allIcons);
  document.getElementById("clearBtn").style.display = "none";
};

document.getElementById("topBtn").onclick = () =>
  window.scrollTo({ top: 0, behavior: "smooth" });

document.getElementById("randomColorBtn").onclick = () => {
  document.querySelectorAll(".icon-box i").forEach(i => {
    i.style.color = `hsl(${Math.random()*360},70%,50%)`;
  });
};

window.addEventListener("scroll", () => {
  document.getElementById("topBtn").style.display =
    window.scrollY > 200 ? "block" : "none";
});

fetchIcons();
</script>

</body>
</html>
