<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>0515364.xyz</title>

<link rel="icon" href="/imgs/logo.png">
<link rel="apple-touch-icon" href="/imgs/logo.png">
<link rel="manifest" href="/json/manifest.json">
<meta name="theme-color" content="#0a0a0a">

<link rel="manifest" href="/json/manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* =========================
   THEME
========================= */

:root{

  /* LIGHT */
  --bg:#f5f5f5;
  --text:#111827;
  --card:#ffffff;
  --border:#dddddd;
  --desc:#6b7280;
  --input:#ffffff;
  --nav:#4b5563;
  --notice:#92400e;
}

[data-theme="dark"]{

  /* DARK */
  --bg:#0a0a0a;
  --text:#e5e7eb;
  --card:#141414;
  --border:#222;
  --desc:#9ca3af;
  --input:#111;
  --nav:#9ca3af;
  --notice:#facc15;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  transition:.25s;
}

/* =========================
   NOTICE
========================= */

.notice-bar{
  background:var(--card);
  border-bottom:1px solid var(--border);
  color:var(--notice);
  font-size:13px;
  padding:8px 0;
  overflow:hidden;
  white-space:nowrap;
}

.notice-content{
  display:inline-block;
  padding-left:100%;
  animation:scroll 15s linear infinite;
}

@keyframes scroll{
  from{transform:translateX(0)}
  to{transform:translateX(-100%)}
}

.hidden{
  display:none;
}

/* =========================
   CONTAINER
========================= */

.container{
  max-width:1100px;
  margin:auto;
  padding:24px;
}

/* =========================
   NAV
========================= */

.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 0;
}

.logo{
  font-weight:700;
  display:flex;
  align-items:center;
  gap:10px;
  font-size:18px;
}

.logo img{
  width:34px;
  height:34px;
  border-radius:10px;
}

.logo i{
  color:#60a5fa;
}

.nav-right{
  display:flex;
  align-items:center;
}

.nav-links a{
  color:var(--nav);
  text-decoration:none;
  margin-left:14px;
  font-size:14px;
}

.nav-links a:hover{
  color:var(--text);
}

/* =========================
   THEME BUTTON
========================= */

.theme-btn{
  margin-left:14px;
  background:none;
  border:1px solid var(--border);
  color:var(--text);
  border-radius:10px;
  padding:6px 10px;
  cursor:pointer;
  transition:.2s;
}

.theme-btn:hover{
  transform:translateY(-1px);
}

/* =========================
   SEARCH
========================= */

.search-box input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--input);
  color:var(--text);
  outline:none;
  box-sizing:border-box;
}

/* =========================
   SECTION
========================= */

.section{
  margin-top:28px;
}

.section-title{
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  font-weight:600;
  margin-bottom:10px;
  color:var(--text);
}

/* =========================
   GRID
========================= */

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

/* =========================
   CARD
========================= */

.card{
  padding:14px;
  border-radius:14px;
  background:var(--card);
  border:1px solid var(--border);
  transition:.2s;
  position:relative;
}

.card:hover{
  transform:translateY(-3px);
  border-color:#3b82f6;
}

.card-title{
  font-size:14px;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:10px;
  color:var(--text);
}

.card-desc{
  font-size:12px;
  color:var(--desc);
  margin-top:6px;
  line-height:1.5;
}

.card i{
  width:18px;
  color:#60a5fa;
}

/* =========================
   STAR
========================= */

.star{
  position:absolute;
  right:10px;
  top:10px;
  cursor:pointer;
  color:#6b7280;
}

.star.active{
  color:#facc15;
}

/* =========================
   MORE BUTTON
========================= */

.more-btn{
  margin-top:12px;
  width:100%;
  padding:10px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  cursor:pointer;
  transition:.2s;
}

.more-btn:hover{
  border-color:#3b82f6;
}

/* =========================
   FOOTER
========================= */

footer{
  margin-top:40px;
  padding:20px 0;
  border-top:1px solid var(--border);
  font-size:12px;
  color:var(--desc);
  text-align:center;
  line-height:1.8;
}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

  .grid{
    grid-template-columns:1fr;
  }

  .nav{
    flex-direction:column;
    align-items:flex-start;
    gap:14px;
  }

  .nav-right{
    width:100%;
    justify-content:space-between;
  }

}

</style>
</head>

<body>

<!-- NOTICE -->
<div id="noticeBar" class="notice-bar hidden">
  <div id="noticeContent" class="notice-content"></div>
</div>

<div class="container">

<!-- NAV -->
<div class="nav">

  <div class="logo">
    <img src="/imgs/logo.png" alt="logo">
    0515364.xyz
  </div>

  <div class="nav-right">

    <div class="nav-links">
      <a href="/pages/about.html">
        <i class="fa-solid fa-circle-info"></i> 关于
      </a>

      <a href="/pages/message.html">
        <i class="fa-solid fa-message"></i> 留言板
      </a>
    </div>

    <button id="themeToggle" class="theme-btn">
      <i class="fa-solid fa-moon"></i>
    </button>

  </div>

</div>

<!-- SEARCH -->
<div class="search-box">
  <input id="search" placeholder="搜索工具（快捷键 / ）">
</div>

<div id="recent"></div>
<div id="favorites"></div>
<div id="menu"></div>

<!-- FOOTER -->
<footer>
  <div>© 2026 0515364.xyz · All Rights Reserved</div>
  <div>Built with JSON CMS · GitHub: bb1026</div>
  <div>本网站代码由 AI 提供</div>
</footer>

</div>

<script>

/* =========================
   DATA
========================= */

let rawData = {};
let favorites = JSON.parse(localStorage.getItem("fav")||"[]");
let recent = JSON.parse(localStorage.getItem("recent")||"[]");

const categoryIcons = {
  "小工具":"fa-solid fa-screwdriver-wrench",
  "代码工具":"fa-solid fa-code",
  "文字工具":"fa-solid fa-font",
  "图片工具":"fa-solid fa-image",
  "小游戏":"fa-solid fa-gamepad",
  "Scriptable":"fa-solid fa-mobile-screen"
};

const expandedSections = {};

/* =========================
   LOAD MENU
========================= */

async function load(){
  const res = await fetch("/json/menu.json");
  rawData = await res.json();
  render();
}

load();

/* =========================
   NOTICE
========================= */

async function loadNotice(){

  try{

    const res = await fetch("/notice.html");
    const text = await res.text();

    const clean = text.replace(/<[^>]*>/g,'').trim();

    const bar = document.getElementById("noticeBar");
    const content = document.getElementById("noticeContent");

    if(clean.length > 0){

      content.innerText = clean;
      bar.classList.remove("hidden");

    }else{

      bar.classList.add("hidden");

    }

  }catch(e){

    document.getElementById("noticeBar")
      .classList.add("hidden");

  }

}

loadNotice();

/* =========================
   RECENT
========================= */

function addRecent(name,url,icon,desc){

  recent = [
    {name,url,icon,desc},
    ...recent.filter(i=>i.url!==url)
  ].slice(0,8);

  localStorage.setItem(
    "recent",
    JSON.stringify(recent)
  );

}

/* =========================
   FAVORITE
========================= */

function toggleFav(name,url,icon,desc){

  const exists = favorites.find(i=>i.url===url);

  if(exists){

    favorites = favorites.filter(i=>i.url!==url);

  }else{

    favorites.push({name,url,icon,desc});

  }

  localStorage.setItem(
    "fav",
    JSON.stringify(favorites)
  );

  render();

}

/* =========================
   CARD
========================= */

function card(item,small=false){

  const name = item[0];
  const url = item[1];
  const desc = item[2] || "";
  const icon = item[3] || "fa-solid fa-circle";

  const fav = favorites.find(f=>f.url===url);

  return `
  <a href="${url}"
     onclick="addRecent('${name}','${url}','${icon}','${desc}')">

    <div class="card">

      <div class="star ${fav?'active':''}"
        onclick="event.preventDefault();
        toggleFav('${name}','${url}','${icon}','${desc}')">

        <i class="fa-solid fa-star"></i>

      </div>

      <div class="card-title">

        <i class="${icon}"></i>

        ${name}

      </div>

      ${desc ? `
      <div class="card-desc">
        ${desc}
      </div>` : ""}

    </div>

  </a>
  `;

}

/* =========================
   RENDER
========================= */

function render(){

  const menu = document.getElementById("menu");
  menu.innerHTML = "";

  const keyword =
    document.getElementById("search")
    .value
    .toLowerCase();

  /* recent */

  document.getElementById("recent").innerHTML =

    recent.length ? `

    <div class="section">

      <div class="section-title">
        <span>
          <i class="fa-solid fa-clock"></i>
          最近使用
        </span>
      </div>

      <div class="grid">
        ${recent.map(i=>
          card([i.name,i.url,i.desc||"",i.icon||""],true)
        ).join("")}
      </div>

    </div>

    ` : "";

  /* favorite */

  document.getElementById("favorites").innerHTML =

    favorites.length ? `

    <div class="section">

      <div class="section-title">
        <span>
          <i class="fa-solid fa-star"></i>
          收藏
        </span>
      </div>

      <div class="grid">
        ${favorites.map(i=>
          card([i.name,i.url,i.desc||"",i.icon||""],true)
        ).join("")}
      </div>

    </div>

    ` : "";

  /* menu */

  for(const k in rawData){

    const arr = rawData[k];

    if(!Array.isArray(arr)) continue;

    let items = arr.filter(i=>

      i[0].toLowerCase().includes(keyword) ||

      (i[2]||"")
      .toLowerCase()
      .includes(keyword)

    );

    if(!items.length) continue;

    const expanded = expandedSections[k];

    const visibleItems =
      expanded ? items : items.slice(0,6);

    menu.innerHTML += `

    <div class="section">

      <div class="section-title"
           onclick="toggle(this)">

        <span>
          <i class="${categoryIcons[k] || "fa-solid fa-folder"}"></i>
          ${k}
        </span>

        <span>
          <i class="fa-solid fa-chevron-down"></i>
        </span>

      </div>

      <div class="grid">

        ${visibleItems.map(i=>card(i)).join("")}

      </div>

      ${items.length > 6 ? `

      <button class="more-btn"
        onclick="toggleMore('${k}')">

        ${expanded ? '收起' : '查看更多'}

      </button>

      ` : ""}

    </div>

    `;

  }

}

/* =========================
   MORE
========================= */

function toggleMore(category){

  expandedSections[category] =
    !expandedSections[category];

  render();

}

/* =========================
   COLLAPSE
========================= */

function toggle(el){

  el.nextElementSibling.classList.toggle("hidden");

}

/* =========================
   SEARCH
========================= */

document.getElementById("search")
.addEventListener("input",render);

/* =========================
   SHORTCUT
========================= */

document.addEventListener("keydown",(e)=>{

  if(e.key=="/"){

    e.preventDefault();

    document.getElementById("search").focus();

  }

  if(e.key==="Escape"){

    document.getElementById("search").value="";

    render();

  }

});

/* =========================
   THEME SYSTEM
========================= */

const savedTheme =
  localStorage.getItem("theme");

if(savedTheme){

  document.documentElement
    .setAttribute("data-theme", savedTheme);

}else{

  if(window.matchMedia(
    "(prefers-color-scheme: dark)"
  ).matches){

    document.documentElement
      .setAttribute("data-theme","dark");

  }

}

function updateThemeIcon(){

  const btn =
    document.getElementById("themeToggle");

  const dark =
    document.documentElement
    .getAttribute("data-theme")==="dark";

  btn.innerHTML = dark
    ? '<i class="fa-solid fa-sun"></i>'
    : '<i class="fa-solid fa-moon"></i>';

}

updateThemeIcon();

document.getElementById("themeToggle")
.addEventListener("click",()=>{

  const current =
    document.documentElement
    .getAttribute("data-theme");

  if(current==="dark"){

    document.documentElement
      .removeAttribute("data-theme");

    localStorage.setItem("theme","light");

  }else{

    document.documentElement
      .setAttribute("data-theme","dark");

    localStorage.setItem("theme","dark");

  }

  updateThemeIcon();

});

/* =========================
   PWA
========================= */

if("serviceWorker" in navigator){

  navigator.serviceWorker.register("/js/sw.js");

}

</script>

</body>
</html>
