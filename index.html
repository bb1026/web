<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>0515364.xyz</title>

<link rel="manifest" href="/json/manifest.json">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin:0;
  font-family:system-ui;
  background:#0a0a0a;
  color:#e5e7eb;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:24px;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 0;
}

.logo{
  font-weight:700;
  display:flex;
  align-items:center;
  gap:8px;
  font-size:18px;
}

.logo i{
  color:#60a5fa;
}

/* NAV LINKS */
.nav-links a{
  color:#9ca3af;
  text-decoration:none;
  margin-left:14px;
  font-size:14px;
}
.nav-links a:hover{color:#fff}

/* SEARCH */
.search-box input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #333;
  background:#111;
  color:#fff;
  outline:none;
}

/* SECTION */
.section{
  margin-top:28px;
  animation:fade .25s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(6px)}
  to{opacity:1;transform:translateY(0)}
}

.section-title{
  display:flex;
  justify-content:space-between;
  cursor:pointer;
  font-weight:600;
  margin-bottom:10px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

/* CARD */
.card{
  padding:14px;
  border-radius:14px;
  background:#141414;
  border:1px solid #222;
  transition:.2s;
  position:relative;
}

.card:hover{
  transform:translateY(-3px);
  border-color:#3b82f6;
}

.card-title{
  font-size:14px;
  font-weight:500;
  display:flex;
  align-items:center;
  gap:10px;
}

.card-desc{
  font-size:12px;
  color:#888;
  margin-top:6px;
}

/* ICON */
.card i{
  width:18px;
  color:#60a5fa;
}

/* STAR */
.star{
  position:absolute;
  right:10px;
  top:10px;
  cursor:pointer;
  color:#666;
}

.star.active{color:gold}

.hidden{display:none}

/* MOBILE */
@media(max-width:768px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="container">

<!-- NAV -->
<div class="nav">

  <div class="logo">
    <i class="fa-solid fa-bolt"></i>
    0515364.xyz
  </div>

  <div class="nav-links">
    <a href="/pages/about.html">
      <i class="fa-solid fa-circle-info"></i> 关于
    </a>
    <a href="/pages/message.html">
      <i class="fa-solid fa-message"></i> 留言板
    </a>
  </div>

</div>

<!-- SEARCH -->
<div class="search-box">
  <input id="search" placeholder="搜索工具（快捷键 / ）">
</div>

<div id="recent"></div>
<div id="favorites"></div>

<div id="menu"></div>

</div>

<script>

let rawData = {};
let favorites = JSON.parse(localStorage.getItem("fav")||"[]");
let recent = JSON.parse(localStorage.getItem("recent")||"[]");

/* 分类图标 */
const categoryIcons = {
  "小工具": "fa-solid fa-screwdriver-wrench",
  "代码工具": "fa-solid fa-code",
  "文字工具": "fa-solid fa-font",
  "图片工具": "fa-solid fa-image",
  "小游戏": "fa-solid fa-gamepad",
  "Scriptable": "fa-solid fa-mobile-screen",
  "关于": "fa-solid fa-circle-info",
  "留言板": "fa-solid fa-message"
};

/* LOAD */
async function load(){
  const res = await fetch("/json/menu.json");
  rawData = await res.json();
  render();
}
load();

/* RECENT */
function addRecent(name,url){
  recent = [{name,url}, ...recent.filter(i=>i.url!==url)].slice(0,8);
  localStorage.setItem("recent",JSON.stringify(recent));
}

/* FAVORITE */
function toggleFav(name,url){
  const exists = favorites.find(i=>i.url===url);
  if(exists){
    favorites = favorites.filter(i=>i.url!==url);
  }else{
    favorites.push({name,url});
  }
  localStorage.setItem("fav",JSON.stringify(favorites));
  render();
}

/* CARD */
function card(item,small=false){
  const name = item[0];
  const url = item[1];
  const desc = item[2] || "";
  const icon = item[3] || "fa-solid fa-circle";

  const fav = favorites.find(f=>f.url===url);

  return `
  <a href="${url}" onclick="addRecent('${name}','${url}')">
    <div class="card">

      <div class="star ${fav?'active':''}"
        onclick="event.preventDefault();toggleFav('${name}','${url}')">
        <i class="fa-solid fa-star"></i>
      </div>

      <div class="card-title">
        <i class="${icon}"></i>
        ${name}
      </div>

      ${(!small && desc) ? `<div class="card-desc">${desc}</div>` : ""}

    </div>
  </a>`;
}

/* RENDER */
function render(){
  const menu = document.getElementById("menu");
  menu.innerHTML="";

  const keyword = document.getElementById("search").value.toLowerCase();

  /* RECENT */
  document.getElementById("recent").innerHTML =
    recent.length ? `
    <div class="section">
      <div class="section-title">
        <span><i class="fa-solid fa-clock"></i> 最近使用</span>
      </div>
      <div class="grid">
        ${recent.map(i=>card([i.name,i.url,"",""],true)).join("")}
      </div>
    </div>` : "";

  /* FAVORITES */
  document.getElementById("favorites").innerHTML =
    favorites.length ? `
    <div class="section">
      <div class="section-title">
        <span><i class="fa-solid fa-star"></i> 收藏</span>
      </div>
      <div class="grid">
        ${favorites.map(i=>card([i.name,i.url,"",""],true)).join("")}
      </div>
    </div>` : "";

  /* MENU */
  for(const k in rawData){
    const arr = rawData[k];
    if(!Array.isArray(arr)) continue;

    let items = arr.filter(i =>
      i[0].toLowerCase().includes(keyword) ||
      (i[2]||"").toLowerCase().includes(keyword)
    );

    if(!items.length) continue;

    menu.innerHTML += `
      <div class="section">

        <div class="section-title" onclick="toggle(this)">
          <span>
            <i class="${categoryIcons[k] || "fa-solid fa-folder"}"></i>
            ${k}
          </span>
          <span><i class="fa-solid fa-chevron-down"></i></span>
        </div>

        <div class="grid">
          ${items.map(i=>card(i)).join("")}
        </div>

      </div>`;
  }
}

/* COLLAPSE */
function toggle(el){
  el.nextElementSibling.classList.toggle("hidden");
}

/* SEARCH */
document.getElementById("search").addEventListener("input",render);

/* SHORTCUTS */
document.addEventListener("keydown",(e)=>{
  if(e.key=="/"){
    e.preventDefault();
    document.getElementById("search").focus();
  }
  if(e.key==="Escape"){
    document.getElementById("search").value="";
    render();
  }
});

/* PWA */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/js/sw.js");
}

</script>

</body>
</html>
