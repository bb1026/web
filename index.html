<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>0515364.xyz</title>

<link rel="icon" href="/imgs/logo.png">
<link rel="apple-touch-icon" href="/imgs/logo.png">
<meta name="theme-color" content="#0a0a0a">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* =========================
   THEME
========================= */

:root{

  --bg:#f5f5f5;
  --text:#111827;
  --card:#ffffff;
  --border:#dddddd;
  --desc:#6b7280;
  --input:#ffffff;
  --nav:#4b5563;
  --notice:#92400e;

}

[data-theme="dark"]{

  --bg:#0a0a0a;
  --text:#e5e7eb;
  --card:#141414;
  --border:#222;
  --desc:#9ca3af;
  --input:#111;
  --nav:#9ca3af;
  --notice:#facc15;

}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  transition:.25s;
}

/* =========================
   NOTICE
========================= */

.notice-bar{
  background:var(--card);
  border-bottom:1px solid var(--border);
  color:var(--notice);
  font-size:14px;
  font-weight:500;
  padding:10px 0;
  overflow:hidden;
  white-space:nowrap;
  position:relative;
}

.notice-content{
  display:inline-block;
  padding-left:100%;
  animation:scroll 22s linear infinite;
  will-change:transform;
}

.notice-bar:hover .notice-content{
  animation-play-state:paused;
}

@media(min-width:769px){

  .notice-content{
    animation-duration:28s;
  }

}

@keyframes scroll{

  0%{
    transform:translateX(0);
  }

  100%{
    transform:translateX(-100%);
  }

}

.hidden{
  display:none;
}

/* =========================
   CONTAINER
========================= */

.container{
  max-width:1100px;
  margin:auto;
  padding:24px;
}

/* =========================
   NAV
========================= */

.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 0;
}

.logo{
  font-weight:700;
  display:flex;
  align-items:center;
  gap:10px;
  font-size:18px;
}

.logo img{
  width:34px;
  height:34px;
  border-radius:10px;
}

.nav-right{
  display:flex;
  align-items:center;
}

.nav-links a{
  color:var(--nav);
  text-decoration:none;
  margin-left:14px;
  font-size:14px;
  transition:.2s;
}

.nav-links a:hover{
  color:var(--text);
}

/* =========================
   THEME BUTTON
========================= */

.theme-btn{
  margin-left:14px;
  background:none;
  border:1px solid var(--border);
  color:var(--text);
  border-radius:10px;
  padding:6px 10px;
  cursor:pointer;
  transition:.2s;
}

.theme-btn:hover{
  transform:translateY(-1px);
}

/* =========================
   SEARCH
========================= */

.search-box input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--input);
  color:var(--text);
  outline:none;
  box-sizing:border-box;
  font-size:14px;
}

.search-wrapper{
  display:flex;
  gap:10px;
}

.search-wrapper select{
  width:150px;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--input);
  color:var(--text);
  outline:none;
}

.search-wrapper button{
  width:52px;
  min-height:44px; /* 👈 iOS 推荐点击高度 */
  display:flex;
  align-items:center;
  justify-content:center;

  border:none;
  border-radius:12px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
  transition:.2s;
  font-size:16px;
}

.search-wrapper button i{
  font-size:18px;
}

.search-wrapper button:active{
  transform:scale(0.96);
}

.search-wrapper button:hover{
  opacity:.9;
}

/* =========================
   SECTION
========================= */

.section{
  margin-top:28px;
}

.section-title{
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  font-weight:600;
  margin-bottom:10px;
  color:var(--text);
}

/* =========================
   GRID
========================= */

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

/* =========================
   CARD
========================= */

.card{
  padding:14px;
  border-radius:14px;
  background:var(--card);
  border:1px solid var(--border);
  transition:.2s;
  position:relative;
}

.card:hover{
  transform:translateY(-3px);
  border-color:#3b82f6;
}

.card-title{
  font-size:14px;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:10px;
  color:var(--text);
}

.card-desc{
  font-size:12px;
  color:var(--desc);
  margin-top:6px;
  line-height:1.5;
}

.card i{
  width:18px;
  color:#60a5fa;
}

/* =========================
   LINK
========================= */

a{
  text-decoration:none;
  color:inherit;
}

/* =========================
   STAR
========================= */

.star{
  position:absolute;
  right:10px;
  top:10px;
  cursor:pointer;
  color:#6b7280;
}

.star.active{
  color:#facc15;
}

/* =========================
   MORE BUTTON
========================= */

.more-btn{
  margin-top:12px;
  width:100%;
  padding:10px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
  cursor:pointer;
  transition:.2s;
}

.more-btn:hover{
  border-color:#3b82f6;
}

/* =========================
   FOOTER
========================= */

footer{
  margin-top:40px;
  padding:20px 0;
  border-top:1px solid var(--border);
  font-size:12px;
  color:var(--desc);
  text-align:center;
  line-height:1.8;
}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

   .search-wrapper{
    flex-direction:column;
  }

  .search-wrapper select,
  .search-wrapper button{
    width:100%;
  }

  .grid{
    grid-template-columns:1fr;
  }

  .nav{
    flex-direction:column;
    align-items:flex-start;
    gap:14px;
  }

  .nav-right{
    width:100%;
    justify-content:space-between;
  }

}

</style>
</head>

<body>

<!-- NOTICE -->
<div id="noticeBar" class="notice-bar hidden">
  <div id="noticeContent" class="notice-content"></div>
</div>

<div class="container">

<!-- NAV -->
<div class="nav">

  <div class="logo">
    <img src="/imgs/logo.png" alt="logo">
    0515364.xyz
  </div>

  <div class="nav-right">

    <div class="nav-links">

      <a href="/pages/about.html">
        <i class="fa-solid fa-circle-info"></i>
        关于
      </a>

      <a href="/pages/message.html">
        <i class="fa-solid fa-message"></i>
        留言板
      </a>

    </div>

    <button id="themeToggle" class="theme-btn">
      <i class="fa-solid fa-moon"></i>
    </button>

  </div>

</div>

<!-- SEARCH -->
<div class="search-box">

  <div class="search-wrapper">

    <select id="searchEngine">

      <option value="site">🔍 Site</option>
      <option value="google">🌎 Google</option>
      <option value="bing">🟦 Bing</option>
      <option value="baidu">🔴 Baidu</option>
      <option value="duckduckgo">🦆 DuckDuckGo</option>
      <option value="github">🐙 GitHub</option>

    </select>

    <input
  id="search"
  placeholder="搜索工具（快捷键 / ）"
  autocomplete="off"
  autocapitalize="off"
  autocorrect="off"
  spellcheck="false"
   />

    <button id="searchBtn">
      <i class="fa-solid fa-magnifying-glass"></i>
    </button>

  </div>

</div>

<div id="recent"></div>
<div id="favorites"></div>
<div id="menu"></div>

<!-- FOOTER -->
<footer>
  <div>© 2026 0515364.xyz · All Rights Reserved</div>
  <div>Built with JSON CMS · Web Tools Platform</div>
  <div>Powered by AI Automation</div>
</footer>

</div>

<script>

/* =========================
   DATA
========================= */

let rawData = {};
let searchIndex = [];

let favorites =
JSON.parse(localStorage.getItem("fav") || "[]");

let recent =
JSON.parse(localStorage.getItem("recent") || "[]");

const categoryIcons = {
  "小工具":"fa-solid fa-screwdriver-wrench",
  "代码工具":"fa-solid fa-code",
  "文字工具":"fa-solid fa-font",
  "图片工具":"fa-solid fa-image",
  "小游戏":"fa-solid fa-gamepad",
  "Scriptable":"fa-solid fa-mobile-screen"
};

const expandedSections = {};

/* =========================
   SAFE
========================= */

function safe(str){
  return (str || "")
    .replace(/'/g,"\\'")
    .replace(/"/g,'\\"');
}

/* =========================
   LOAD
========================= */

async function load(){
  const res = await fetch("/json/menu.json");
  rawData = await res.json();

  buildIndex(); // 🚀 新增索引
  render();
}
load();

/* =========================
   BUILD SEARCH INDEX（2.1核心）
========================= */

function buildIndex(){

  searchIndex = [];

  for(const k in rawData){
    const arr = rawData[k];
    if(!Array.isArray(arr)) continue;

    for(const item of arr){

      searchIndex.push({
        cat:k,
        name:item[0],
        url:item[1],
        desc:item[2] || "",
        icon:item[3] || "fa-solid fa-circle"
      });

    }
  }
}

/* =========================
   NOTICE
========================= */

async function loadNotice(){
  const res = await fetch("notice.html",{cache:"no-store"});
  const text = await res.text();

  const clean = text.replace(/<[^>]*>/g,'').trim();

  const bar = document.getElementById("noticeBar");
  const content = document.getElementById("noticeContent");

  if(clean.length){
    content.innerText = clean;
    bar.classList.remove("hidden");
  }else{
    bar.classList.add("hidden");
  }
}
loadNotice();

/* =========================
   RECENT
========================= */

function addRecent(name,url,icon,desc){

  recent = [
    {name,url,icon,desc},
    ...recent.filter(i=>i.url!==url)
  ].slice(0,3); // 🚀 扩展一点

  localStorage.setItem("recent",JSON.stringify(recent));
}

/* =========================
   FAVORITE（优化排序）
========================= */

function toggleFav(name,url,icon,desc){

  const exists = favorites.find(i=>i.url===url);

  if(exists){
    favorites = favorites.filter(i=>i.url!==url);
  }else{
    favorites.unshift({name,url,icon,desc}); // 🚀 最新优先
  }

  localStorage.setItem("fav",JSON.stringify(favorites));
  render();
}

/* =========================
   CARD（新增高亮支持）
========================= */

function highlight(text,keyword){
  if(!keyword) return text;
  return text.replace(
    new RegExp(keyword,"gi"),
    m=>`<mark>${m}</mark>`
  );
}

function card(item,keyword=""){

  const name = highlight(item[0],keyword);
  const url = item[1];
  const desc = highlight(item[2] || "",keyword);
  const icon = item[3] || "fa-solid fa-circle";

  const fav = favorites.find(f=>f.url===url);

  return `
  <a href="${url}"
     onclick="addRecent('${safe(item[0])}','${safe(url)}','${safe(icon)}','${safe(item[2]||"")}')">

    <div class="card">

      <div class="star ${fav?'active':''}"
        onclick="event.preventDefault();event.stopPropagation();
        toggleFav('${safe(item[0])}','${safe(url)}','${safe(icon)}','${safe(item[2]||"")}')">

        <i class="fa-solid fa-star"></i>
      </div>

      <div class="card-title">
        <i class="${icon}"></i>${name}
      </div>

      ${desc?`<div class="card-desc">${desc}</div>`:""}

    </div>
  </a>`;
}

/* =========================
   RENDER（2.1优化）
========================= */

function render(){

  const menu = document.getElementById("menu");
  menu.innerHTML = "";

  const keyword = document.getElementById("search").value.toLowerCase();

  /* recent */
  document.getElementById("recent").innerHTML =
  recent.length ? `
  <div class="section">
    <div class="section-title"><span>最近使用</span></div>
    <div class="grid">
      ${recent.map(i=>card([i.name,i.url,i.desc||"",i.icon||""],keyword)).join("")}
    </div>
  </div>` : "";

  /* favorite */
  document.getElementById("favorites").innerHTML =
  favorites.length ? `
  <div class="section">
    <div class="section-title"><span>收藏</span></div>
    <div class="grid">
      ${favorites.map(i=>card([i.name,i.url,i.desc||"",i.icon||""],keyword)).join("")}
    </div>
  </div>` : "";

  /* menu（用 index 加速） */
  const grouped = {};

  for(const item of searchIndex){

    if(
      item.name.toLowerCase().includes(keyword) ||
      item.desc.toLowerCase().includes(keyword)
    ){

      if(!grouped[item.cat]) grouped[item.cat]=[];
      grouped[item.cat].push(item);

    }
  }

  for(const k in grouped){

  const items = grouped[k];
  const expanded = expandedSections[k];
  const visible = expanded ? items : items.slice(0,6);

  menu.innerHTML += `
  <div class="section">

    <div class="section-title">
      <span>
        <i class="${categoryIcons[k]||"fa-solid fa-folder"}"></i>
        ${k}
      </span>
    </div>

    <div class="grid">
      ${visible.map(i=>card([i.name,i.url,i.desc,i.icon],keyword)).join("")}
    </div>

    ${items.length > 6 ? `
      <button class="more-btn"
        onclick="toggleMore('${safe(k)}')">
        ${expanded ? '收起' : `查看更多 (${items.length - 6})`}
      </button>
    ` : ""}

  </div>
  `;
 }
}

/* =========================
   MORE
========================= */

function toggleMore(k){
  expandedSections[k]=!expandedSections[k];
  render();
}

/* =========================
   DEBOUNCE（2.1优化）
========================= */

function debounce(fn,delay=120){
  let t;
  return (...args)=>{
    clearTimeout(t);
    t=setTimeout(()=>fn(...args),delay);
  }
}

const debouncedRender = debounce(render);

/* =========================
   SEARCH INPUT（优化）
========================= */

document.getElementById("search").addEventListener("input",()=>{
  debouncedRender();
});

/* =========================
   KEYBOARD
========================= */

document.addEventListener("keydown",(e)=>{

  if(e.key==="/"){
    e.preventDefault();
    document.getElementById("search").focus();
  }

  if(e.key==="Enter"){
    const mode=document.getElementById("searchEngine").value;
    if(mode==="site") render();
    else doSearch();
  }

  if(e.key==="Escape"){
    document.getElementById("search").value="";
    render();
  }

});

/* =========================
   SEARCH ENGINE
========================= */

function doSearch(){

  const keyword=document.getElementById("search").value.trim();
  if(!keyword) return;

  const engine=document.getElementById("searchEngine").value;

  const map={
    google:"https://www.google.com/search?q=",
    bing:"https://www.bing.com/search?q=",
    baidu:"https://www.baidu.com/s?wd=",
    duckduckgo:"https://duckduckgo.com/?q=",
    github:"https://github.com/search?q="
  };

  if(engine==="site"){
    render();
    return;
  }

  window.open(map[engine]+encodeURIComponent(keyword));
}

/* =========================
   THEME（原样保留）
========================= */

const savedTheme=localStorage.getItem("theme");

if(savedTheme){
  document.documentElement.setAttribute("data-theme",savedTheme);
}

   document.getElementById("search").setAttribute("autocomplete","off");

</script>
   
</body>
</html>
