<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>0515364.xyz</title>

<link rel="manifest" href="/json/manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin:0;
  font-family:system-ui;
  background:#0a0a0a;
  color:#e5e7eb;
}

/* container */
.container{
  max-width:1100px;
  margin:auto;
  padding:24px;
}

/* nav */
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 0;
}

.logo{
  font-weight:700;
  display:flex;
  align-items:center;
  gap:8px;
}

.logo i{color:#60a5fa}

/* links */
.nav-links a{
  color:#9ca3af;
  text-decoration:none;
  margin-left:14px;
  font-size:14px;
}
.nav-links a:hover{color:#fff}

/* search */
.search-box input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #2a2a2a;
  background:#111;
  color:#fff;
}

/* section */
.section{
  margin-top:28px;
}

.section-title{
  display:flex;
  justify-content:space-between;
  cursor:pointer;
  font-weight:600;
  margin-bottom:10px;
  color:#e5e7eb;
}

/* grid */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

/* card */
.card{
  padding:14px;
  border-radius:14px;
  background:#141414;
  border:1px solid #222;
  transition:.2s;
  position:relative;
}

.card:hover{
  transform:translateY(-3px);
  border-color:#3b82f6;
}

/* title */
.card-title{
  font-size:14px;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:10px;
  color:#e5e7eb;
}

.card-desc{
  font-size:12px;
  color:#9ca3af; 
  margin-top:6px;
}

/* icon */
.card i{
  width:18px;
  color:#60a5fa;
}

/* star */
.star{
  position:absolute;
  right:10px;
  top:10px;
  cursor:pointer;
  color:#6b7280;
}

.star.active{
  color:#facc15;
}

/* hidden */
.hidden{display:none}

/* footer */
footer{
  margin-top:40px;
  padding:20px 0;
  border-top:1px solid #222;
  font-size:12px;
  color:#9ca3af;
  text-align:center;
}

/* mobile */
@media(max-width:768px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="container">

<!-- NAV -->
<div class="nav">

  <div class="logo">
    <i class="fa-solid fa-bolt"></i>
    0515364.xyz
  </div>

  <div class="nav-links">
    <a href="/pages/about.html"><i class="fa-solid fa-circle-info"></i> 关于</a>
    <a href="/pages/message.html"><i class="fa-solid fa-message"></i> 留言板</a>
  </div>

</div>

<!-- SEARCH -->
<div class="search-box">
  <input id="search" placeholder="搜索工具（快捷键 / ）">
</div>

<div id="recent"></div>
<div id="favorites"></div>
<div id="menu"></div>

<!-- FOOTER -->
<footer>
  <div>© 2026 0515364.xyz · All Rights Reserved</div>
  <div>Built with JSON CMS · GitHub: bb1026</div>
  <div>本网站代码由AI提供</div>
</footer>

</div>

<script>

let rawData = {};
let favorites = JSON.parse(localStorage.getItem("fav")||"[]");
let recent = JSON.parse(localStorage.getItem("recent")||"[]");

const categoryIcons = {
  "小工具":"fa-solid fa-screwdriver-wrench",
  "代码工具":"fa-solid fa-code",
  "文字工具":"fa-solid fa-font",
  "图片工具":"fa-solid fa-image",
  "小游戏":"fa-solid fa-gamepad",
  "Scriptable":"fa-solid fa-mobile-screen",
  "关于":"fa-solid fa-circle-info",
  "留言板":"fa-solid fa-message"
};

async function load(){
  const res = await fetch("/json/menu.json");
  rawData = await res.json();
  render();
}
load();

/* recent */
function addRecent(name,url,icon,desc){
  recent = [{name,url,icon,desc}, ...recent.filter(i=>i.url!==url)].slice(0,8);
  localStorage.setItem("recent",JSON.stringify(recent));
}

/* fav */
function toggleFav(name,url,icon,desc){
  const exists = favorites.find(i=>i.url===url);

  if(exists){
    favorites = favorites.filter(i=>i.url!==url);
  }else{
    favorites.push({name,url,icon,desc});
  }

  localStorage.setItem("fav",JSON.stringify(favorites));
  render();
}

/* card */
function card(item,small=false){
  const name = item[0];
  const url = item[1];
  const desc = item[2] || "";
  const icon = item[3] || "fa-solid fa-circle";

  const fav = favorites.find(f=>f.url===url);

  return `
  <a href="${url}" onclick="addRecent('${name}','${url}','${icon}','${desc}')">
    <div class="card">

      <div class="star ${fav?'active':''}"
        onclick="event.preventDefault();toggleFav('${name}','${url}','${icon}','${desc}')">
        <i class="fa-solid fa-star"></i>
      </div>

      <div class="card-title">
        <i class="${icon}"></i>
        ${name}
      </div>

      ${(!small && desc) ? `<div class="card-desc">${desc}</div>` : ""}

    </div>
  </a>`;
}

/* render */
function render(){
  const menu = document.getElementById("menu");
  menu.innerHTML="";

  const keyword = document.getElementById("search").value.toLowerCase();

  /* recent */
  document.getElementById("recent").innerHTML =
    recent.length ? `
    <div class="section">
      <div class="section-title"><i class="fa-solid fa-clock"></i> 最近使用</div>
      <div class="grid">
        ${recent.map(i=>card([i.name,i.url,i.desc||"",i.icon||""],true)).join("")}
      </div>
    </div>` : "";

  /* fav */
  document.getElementById("favorites").innerHTML =
    favorites.length ? `
    <div class="section">
      <div class="section-title"><i class="fa-solid fa-star"></i> 收藏</div>
      <div class="grid">
        ${favorites.map(i=>card([i.name,i.url,i.desc||"",i.icon||""],true)).join("")}
      </div>
    </div>` : "";

  /* menu */
  for(const k in rawData){
    const arr = rawData[k];
    if(!Array.isArray(arr)) continue;

    let items = arr.filter(i =>
      i[0].toLowerCase().includes(keyword) ||
      (i[2]||"").toLowerCase().includes(keyword)
    );

    if(!items.length) continue;

    menu.innerHTML += `
      <div class="section">

        <div class="section-title" onclick="toggle(this)">
          <span><i class="${categoryIcons[k]||"fa-solid fa-folder"}"></i> ${k}</span>
          <span><i class="fa-solid fa-chevron-down"></i></span>
        </div>

        <div class="grid">
          ${items.map(i=>card(i)).join("")}
        </div>

      </div>`;
  }
}

/* toggle */
function toggle(el){
  el.nextElementSibling.classList.toggle("hidden");
}

/* search */
document.getElementById("search").addEventListener("input",render);

/* shortcut */
document.addEventListener("keydown",(e)=>{
  if(e.key=="/"){
    e.preventDefault();
    document.getElementById("search").focus();
  }
  if(e.key==="Escape"){
    document.getElementById("search").value="";
    render();
  }
});

/* pwa */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/js/sw.js");
}

</script>

</body>
</html>
