<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>工具搜索 - 在线工具箱</title>

  <!-- 样式表 -->
  <link rel="stylesheet" href="/css/style.css">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      overflow-x: hidden;
      background: #fff;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* 顶部栏 */
    .header {
      width: 100%;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid #eee;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      height: 40px;
    }

    .home-btn {
      padding: 8px 14px;
      background: #0366d6;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-size: 14px;
    }

    /* 主内容区 */
    .search-page {
      flex: 1;
      width: 100%;
      max-width: 800px;
      margin: 100px auto 10px;
      padding: 20px;
    }

    .search-header {
      margin: 20px 0 30px;
      text-align: center;
    }

    .search-box-container {
      width: 100%;
      padding: 0 20px;
    }

    .search-box {
      width: 100%;
      max-width: 800px;
      margin: 0 auto 30px;
    }

    #search-input {
      width: 100%;
      padding: 16px 24px;
      font-size: 18px;
      border: 2px solid #ddd;
      border-radius: 10px;
      transition: all 0.2s ease;
    }

    #search-input:focus {
      border-color: #0366d6;
      outline: none;
    }

    .default-hint {
      text-align: center;
      color: #666;
      margin-top: 15px;
      font-size: 14px;
    }

    .search-results {
      margin: 30px 0 10px;
      width: 100%;
    }

    .result-item {
      display: block;
      padding: 16px;
      margin-bottom: 15px;
      background: white;
      border: 1px solid #e1e4e8;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .result-item:hover {
      border-color: #0366d6;
      transform: translateY(-2px);
    }

    .result-title {
      font-size: 17px;
      font-weight: 600;
      color: #24292e;
    }

    .result-category {
      font-size: 14px;
      color: #586069;
    }

    .no-results {
      text-align: center;
      padding: 40px 20px;
      background: #fafbfc;
      border-radius: 8px;
      margin-top: 30px;
      border: 1px solid #e1e4e8;
    }

    @media (max-width: 768px) {
      .search-page {
        margin: 80px auto 10px;
        padding: 15px;
      }

      #search-input {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

  <!-- 顶部栏 + 首页按钮 -->
  <div class="header">
    <div class="header-left">
      <img src="/imgs/logo.png" class="logo" alt="logo">
      <span>在线工具箱</span>
    </div>

    <a class="home-btn" href="/">首页</a>
  </div>

  <!-- 主内容 -->
  <main class="search-page">
    <div class="search-header">
      <h1>搜索工具箱</h1>
    </div>

    <div class="search-box-container">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="输入工具关键词..." autocomplete="off">
      </div>

      <div id="default-hint" class="default-hint">
        <p>例如：时间戳、JSON、编码</p>
      </div>
    </div>

    <div id="results" class="search-results"></div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {

      const loadToolsData = async () => {
        try {
          const response = await fetch('/json/menu.json', {
            headers: {
              'X-Auth-Key': 'tX3$9mGz@7vLq#F!b2R'
            }
          });

          const data = await response.json();

          const normalizedData = {};
          for (const [category, items] of Object.entries(data)) {
            normalizedData[category] = items.map(item =>
              Array.isArray(item) ? item : [item, "#"]
            );
          }

          return normalizedData;
        } catch (e) {
          return null;
        }
      };

      const performSearch = (data, query) => {
        if (!data) return [];

        const q = query.toLowerCase().trim();
        const hint = document.getElementById('default-hint');

        if (!q) {
          hint.style.display = 'block';
          return [];
        }

        hint.style.display = 'none';

        const results = [];

        Object.entries(data).forEach(([cat, items]) => {
          items.forEach(([name, url]) => {
            if (name.toLowerCase().includes(q)) {
              results.push({
                name,
                url: url.startsWith('http') ? url : `https://www.0515364.xyz${url}`,
                category: cat
              });
            }
          });
        });

        return results;
      };

      const renderResults = (results) => {
        const box = document.getElementById('results');

        if (!results.length && document.getElementById('search-input').value) {
          box.innerHTML = `<div class="no-results">没有找到结果</div>`;
          return;
        }

        box.innerHTML = results.map(i => `
          <a class="result-item" href="${i.url}">
            <div class="result-title">${i.name}</div>
            <div class="result-category">${i.category}</div>
          </a>
        `).join('');
      };

      const init = async () => {
        const data = await loadToolsData();
        const input = document.getElementById('search-input');

        input.addEventListener('input', e => {
          const res = performSearch(data, e.target.value);
          renderResults(res);
        });
      };

      init();
    });
  </script>

</body>
</html>
