name: Deploy QR Server Clone

on:
  push:
    branches: [main]
    paths:
      - 'Cloudflare/qr-worker.js'
      - 'Cloudflare/qr-wrangler.toml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Wrangler v2
        run: npm install -g wrangler@2

      - name: Publish Worker
        working-directory: Cloudflare
        run: wrangler publish --config qr-wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}