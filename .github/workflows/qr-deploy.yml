name: Deploy qr-worker (二维码)

on:
  push:
    branches: [main]
    paths:
      - 'Cloudflare/qr-worker.js'
      - 'Cloudflare/qr-wrangler.toml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Wrangler v3
        run: npm install -g wrangler@3

      - name: Publish qr-worker to Cloudflare
        working-directory: Cloudflare
        run: |
          wrangler publish --config qr-wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}