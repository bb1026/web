name: Generate Calendar

on:
  schedule:
    - cron: "0 0 1 1 *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache Node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - run: npm install

      - name: Generate ICS
        run: |
          mkdir -p calendar
          echo "Generating calendar ICS..."
          node generate/generate.js
          echo "ICS generation complete."

      - name: Commit & Push
        run: |
          git config user.name "calendar-bot"
          git config user.email "bot@example.com"
          git add calendar/*.ics
          git diff-index --quiet HEAD || git commit -m "Update calendar"
          git push origin HEAD
