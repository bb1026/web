name: Generate Calendar

on:
  schedule:
    - cron: "0 0 1 1 *" # 每年 1 月 1 日
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install

      - name: Generate ICS
        run: node generate/generate.js

      - name: Commit & Push
        run: |
          git config user.name "calendar-bot"
          git config user.email "bot@example.com"
          git add calendar/*.ics
          git commit -m "Update calendar" || echo "No changes"
          git push
