name: Daily Railway Update(火车时刻表)

on:
  schedule:
    - cron: "0 3 * * *"   # 每天 UTC 3点
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: npm install csv-parser

      - name: Run update script
        run: node web/railway-data/scripts/merge.js

      - name: Validate data
        run: node web/railway-data/scripts/validate.js

      - name: Commit changes
        run: |
          git config user.name "railway-bot"
          git config user.email "bot@github.com"
          git add web/railway-data/data/
          git commit -m "auto update railway data" || echo "no changes"
          git push
